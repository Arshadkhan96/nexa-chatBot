<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- domain logo -->
    <link rel="icon" href="./nexa-logo.jpg">
    <title>Nexa AI </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-neutral-900 text-white">

    <div class="max-w-3xl mx-auto px-3 pb-40" id="chat-container">

        <!-- Compact header -->
        <div class="sticky top-0 bg-neutral-900 py-4 border-b border-neutral-800 mb-4 z-20">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full overflow-hidden bg-white flex items-center justify-center">
                        <img src="./nexa-logo.jpg" alt="Nexa AI logo" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="text-lg font-semibold">Nexa AI</p>
                        <p class="text-xs text-neutral-400">Smart assistant</p>
                    </div>
                </div>
                <label class="cursor-pointer rounded-full border border-neutral-700 px-4 py-2 text-sm transition hover:bg-neutral-700">
                    Choose PDF
                    <input id="pdf-file" type="file" accept="application/pdf" class="hidden" />
                </label>
            </div>
        </div>

    </div>

    <!-- Input Area -->
    <div class="fixed inset-x-0 bottom-0 flex justify-center bg-neutral-900">

        <div class="bg-neutral-800 p-2 rounded-3xl w-full max-w-3xl mb-2 mx-2">

            <textarea
                id="input"
                rows="2"
                placeholder="Message Nexa..."
                class="w-full p-3 rounded-xl resize-none outline-none bg-transparent text-white placeholder:text-neutral-500"
            ></textarea>

            <div class="flex justify-end">

                <button
                    id="ask"
                    class="bg-white text-black px-5 py-2 rounded-full hover:bg-neutral-300 transition"
                >
                    Send
                </button>

            </div>

        </div>

    </div>

    <script src="./script.js"></script>

</body>
</html>
