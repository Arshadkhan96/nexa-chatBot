<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa AI </title>
    <base href="/">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-neutral-900 text-white">

    <div class="max-w-3xl mx-auto px-3 pb-40" id="chat-container">

        <!-- Header -->
        <div class="sticky top-0 bg-neutral-900 py-4 border-b border-neutral-800 mb-4">
            <h1 class="text-xl font-bold">Nexa AI</h1>
            <p class="text-sm text-neutral-400">
                Smart Personal Assistant
            </p>
        </div>

        <!-- Welcome Message -->
        <div class="my-4 bg-neutral-800 p-3 rounded-xl max-w-fit">
            👋 Hi, I'm Nexa. Ask me anything.
        </div>

    </div>

    <!-- Input Area -->
    <div class="fixed inset-x-0 bottom-0 flex justify-center bg-neutral-900">

        <div class="bg-neutral-800 p-2 rounded-3xl w-full max-w-3xl mb-2 mx-2">

            <textarea
                id="input"
                rows="2"
                placeholder="Message Nexa..."
                class="w-full p-3 rounded-xl resize-none outline-none bg-transparent text-white placeholder:text-neutral-500"
            ></textarea>

            <div class="flex justify-end">

                <button
                    id="ask"
                    class="bg-white text-black px-5 py-2 rounded-full hover:bg-neutral-300 transition"
                >
                    Send
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
